name: 경쟁사 프로모션 모니터링

on:
  schedule:
    - cron: '0 1 * * 1'  # 매주 월요일 오전 10시 (KST)
  workflow_dispatch:      # 수동 실행

jobs:

  # ① 크롤링 (Playwright 컨테이너 필요 — git 작업 없음)
  crawl:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.44.0-jammy
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt
      - run: python crawler/main.py
      - uses: actions/upload-artifact@v4
        with:
          name: data
          path: data/
          retention-days: 1

  # ② 수집 데이터 git 커밋 (컨테이너 없음 — git 작업 안전)
  commit_data:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data/
      - name: 수집 JSON 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d) 경쟁사 수집"
          git push

  # ③ 리포트 생성 (Playwright 컨테이너 필요 — git 작업 없음)
  generate_report:
    needs: commit_data
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.44.0-jammy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data/
      - run: pip install -r requirements.txt
      - name: 이전 주차 파일 복원
        run: |
          if [ -d pages_archive ]; then
            mkdir -p _deploy
            cp -r pages_archive/. _deploy/
            echo "이전 주차 복원 완료"
          else
            echo "첫 실행 — 복원할 아카이브 없음"
          fi
      - run: python crawler/build_report.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: deploy
          path: _deploy/
          retention-days: 1

  # ④ 리포트 아카이브 git 커밋 (컨테이너 없음 — git 작업 안전)
  commit_archive:
    needs: generate_report
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/download-artifact@v4
        with:
          name: deploy
          path: _deploy/
      - name: 이번 주차 아카이브 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p pages_archive/img
          cp _deploy/weeks.json pages_archive/
          cp _deploy/*.html pages_archive/
          if [ -d _deploy/img ]; then
            cp -r _deploy/img/. pages_archive/img/
          fi
          git add pages_archive/
          git diff --cached --quiet || git commit -m "archive: 주차별 리포트 누적 저장"
          git push

  # ⑤ GitHub Pages 빌드
  build:
    needs: commit_archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy
          path: _deploy/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy/

  # ⑥ GitHub Pages 배포
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
