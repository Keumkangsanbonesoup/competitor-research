stages:
  - crawl

weekly-competitor-crawl:
  stage: crawl
  image: mcr.microsoft.com/playwright/python:v1.44.0-jammy
  script:
    - pip install -r requirements.txt
    - python crawler/main.py

    # === 결과 JSON 커밋 ===
    # shell에서 base64를 인수로 넘기면 ARG_MAX 초과 → Python 스크립트로 처리
    - TODAY=$(date +%Y-%m-%d)

    # 1) 'data' 브랜치 없으면 생성 (이미 있으면 400 → 무시)
    - |
      curl --silent --output /dev/null \
        --request POST \
        --header "PRIVATE-TOKEN: ${CI_PUSH_TOKEN}" \
        "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/repository/branches?branch=data&ref=main"

    # 2) Python 스크립트로 커밋 (대용량 파일도 안전)
    - python crawler/commit_result.py "data/${TODAY}.json"

  artifacts:
    name: "competitor-data-$CI_PIPELINE_CREATED_AT"
    paths:
      - data/
    expire_in: 8 weeks
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
