# Songbird 자동 배포 설정
# 폴더 안의 모든 정적 파일(HTML, CSS, JS, 이미지 등)을 그대로 진열장에 올려요.
# 새 파일을 추가해도 YAML은 더 안 고쳐도 돼요.

include:
  - component: $CI_SERVER_FQDN/alattalatta/songbird/deploy@1.1.0
    inputs:
      needs:
        - build
      outputdir: dist
      stage: deploy

stages:
  - build
  - deploy

build:
  image: alpine
  stage: build
  script:
    - mkdir -p dist
    # 루트 폴더에 있는 거 전부 dist로 옮김 (단, dist 자신, .git, .gitlab-ci.yml은 제외)
    - find . -mindepth 1 -maxdepth 1 ! -name dist ! -name '.git' ! -name '.gitlab-ci.yml' -exec cp -r {} dist/ \;
  artifacts:
    paths:
      - dist
    expire_in: 5 mins