stages:
  - crawl

weekly-competitor-crawl:
  stage: crawl
  image: mcr.microsoft.com/playwright/python:v1.44.0-jammy
  script:
    - pip install -r requirements.txt
    - python crawler/main.py

    # === 결과 JSON 커밋 ===
    # main은 보호 브랜치라 API/토큰 직접 커밋이 차단(403)됨.
    # → 보호되지 않은 'data' 브랜치에 커밋한다.
    - TODAY=$(date +%Y-%m-%d)
    - FILE_PATH="data/${TODAY}.json"
    - FILE_CONTENT=$(base64 -w 0 ${FILE_PATH})
    - DATA_BRANCH="data"

    # 1) 'data' 브랜치가 없으면 main에서 새로 생성 (이미 있으면 400 → 무시)
    - |
      curl --silent --output /dev/null \
        --request POST \
        --header "PRIVATE-TOKEN: ${CI_PUSH_TOKEN}" \
        "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/repository/branches?branch=${DATA_BRANCH}&ref=main"

    # 2) 파일 커밋: create 시도 → 같은 날 재실행 등으로 이미 있으면 update로 재시도
    - |
      commit_file () {
        curl --silent --output /dev/null --write-out "%{http_code}" \
          --request POST \
          --header "PRIVATE-TOKEN: ${CI_PUSH_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{
            \"branch\": \"${DATA_BRANCH}\",
            \"commit_message\": \"chore: weekly competitor data ${TODAY}\",
            \"actions\": [{
              \"action\": \"$1\",
              \"file_path\": \"${FILE_PATH}\",
              \"content\": \"${FILE_CONTENT}\",
              \"encoding\": \"base64\"
            }]
          }" \
          "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/repository/commits"
      }
      RESPONSE=$(commit_file "create")
      if [ "$RESPONSE" != "201" ]; then
        echo "create 실패(${RESPONSE}) → update로 재시도"
        RESPONSE=$(commit_file "update")
      fi
      echo "API 응답 코드: ${RESPONSE}"
      if [ "$RESPONSE" = "201" ]; then
        echo "✅ data 브랜치 커밋 성공: ${FILE_PATH}"
      else
        echo "⚠️ 커밋 실패 (${RESPONSE}) - Artifacts에서 수동 다운로드 필요"
      fi
  artifacts:
    name: "competitor-data-$CI_PIPELINE_CREATED_AT"
    paths:
      - data/
    expire_in: 8 weeks
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual